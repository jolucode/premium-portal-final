<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Facturación Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-up">
        <header class="dashboard-header">
            <div class="company-info">
                <a href="dashboard.html" style="color:var(--primary); margin-right: 1.5rem; font-size: 1.5rem;"><i class="fas fa-arrow-left"></i></a>
                <img src="assets/logo.png" alt="Logo" id="headerLogo">
                <div>
                    <h2>Gestión de Usuarios</h2>
                    <small id="companyName" style="color: var(--secondary)">---</small>
                </div>
            </div>
            <div class="user-controls">
                <span>Sesión Admin: <strong id="companyRuc">---</strong></span>
            </div>
        </header>

        <div style="display:grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
            <!-- Create User Form -->
            <section class="glass-card">
                <h3 style="margin-bottom: 1.5rem; color: var(--primary-dark)">
                    <i class="fas fa-user-plus"></i> Nuevo Usuario
                </h3>
                <form id="createUserForm">
                    <div class="form-group">
                        <label for="newUsername">Nombre de Usuario</label>
                        <input type="text" id="newUsername" placeholder="Ej: jperis" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Contraseña</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Crear Usuario
                    </button>
                    <div id="formMessage" style="margin-top:1rem; font-size:0.875rem; display:none"></div>
                </form>
            </section>

            <!-- User List -->
            <section class="glass-card">
                <h3 style="margin-bottom: 1.5rem; color: var(--primary-dark)">
                    <i class="fas fa-users-cog"></i> Usuarios Actuales
                </h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre de Usuario</th>
                                <th>RUC Empresa</th>
                                <th style="text-align:center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script src="js/users.js"></script>
</body>
</html>
